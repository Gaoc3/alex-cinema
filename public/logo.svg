<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16203a" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>
    
    <!-- Primary Red Gradient -->
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff1e27" />
      <stop offset="50%" stop-color="#e50914" />
      <stop offset="100%" stop-color="#8a0006" />
    </linearGradient>

    <!-- Metallic Silver Gradient -->
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#9ca3af" />
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Perfect Circular Base with Shadow -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" filter="url(#shadow)" />
  
  <!-- Outer Glow Ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#primary)" stroke-width="4" opacity="0.4" filter="url(#glow)" />
  <circle cx="256" cy="256" r="215" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

  <!-- The "AX" Monogram -->
  <g transform="translate(106, 120)" filter="url(#shadow)">
    <!-- 'A' Left Diagonal -->
    <path d="M 110 0 L 160 0 L 70 270 L 20 270 Z" fill="url(#silver)" />
    
    <!-- 'A' Right Diagonal / Play Shape -->
    <path d="M 140 0 L 300 135 L 140 270 L 90 270 L 230 135 L 90 0 Z" fill="url(#primary)" filter="url(#glow)" />
    
    <!-- Crossbar -->
    <path d="M 60 170 L 180 170 L 170 210 L 45 210 Z" fill="url(#silver)" />
  </g>
</svg>
