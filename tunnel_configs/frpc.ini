[common]
# The IP address of your new VPS server
server_addr = YOUR_VPS_IP_HERE
server_port = 7000

# Authentication token (Must match the server)
token = AlexCinemaSecretTunnel2026

[shabakaty-proxy]
type = http
# Local port on the router where the internal Nginx/Proxy is running (currently 80 for Earthlink proxy)
local_port = 80
local_ip = 127.0.0.1
# A custom domain/hostname the VPS Nginx will use to route to this tunnel
custom_domains = cinemana-tunnel.local
