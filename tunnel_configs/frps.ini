[common]
# The port the FRP server listens on for the FRP client (your router)
bind_port = 7000

# Authentication token (Change this to a strong password!)
token = AlexCinemaSecretTunnel2026

# Dashboard port and credentials (optional, for monitoring)
dashboard_port = 7500
dashboard_user = admin
dashboard_pwd = admin

# Nginx will forward requests to this vhost_http_port
vhost_http_port = 8080
