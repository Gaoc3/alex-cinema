project:
  name: AleX Cinema (arabseed-premium)
  description: "Arabic premium streaming platform that proxies content from the Cinemana/Shabakaty Android API. Dual-frontend (Flask + Next.js) with Netflix-like, ad-free UX for browsing, searching, and watching Arabic movies, series, and anime."
  version: "1.0.0"
  language: Python/TypeScript/JavaScript
  package_manager: npm/pip

tech_stack:
  backend:
    - Python 3 + Flask
    - Next.js 16.2.7 (App Router)
    - Node.js
  frontend:
    - React 19.2.4
    - TypeScript 5
    - Tailwind CSS 4
    - Jinja2 templates (Flask legacy)
  video_player:
    - Video.js 8.23.7 (Next.js)
    - Plyr.js 3.7.8 (Flask)
    - HLS.js (streaming)
  data_source:
    - Cinemana/Shabakaty Android API (private)
  proxy_tunnel:
    - CGI tunnel via HF Space (mtsky-free-server-docker)
    - Cloudflare tunnel (cloudflared.exe)
  testing:
    - Playwright (Python QA screenshots)
    - Numerous JS API exploration scripts
  styling:
    - Cairo font (Arabic)
    - Outfit/Inter fonts (English)
    - Font Awesome 6
    - Custom dark/cyberpunk theme (3119 lines CSS)

features:
  - Hero carousel with auto-rotating featured content
  - Category-based browsing (12+ genres)
  - Video grids with poster, rating, year, type badges
  - Full-text search with advanced filters (genre, year, rating, type)
  - Dedicated movies archive page with pagination and sorting
  - Dedicated series archive page with latest episodes view
  - Full-featured video watch page:
    - Multiple quality streams with resolution selector
    - Subtitle tracks (Arabic/English) with SRT-to-VTT conversion
    - Intro skipping (auto-skip intro/outro)
    - Episode navigation for series
    - Season selectors and episode grids
    - Server/source selection
    - Picture-in-picture
    - Keyboard shortcuts and mobile gestures
  - RTL support (Arabic-first design)
  - Responsive design (desktop, tablet, mobile)
  - Proxy API route (/api/proxy) tunneling all media through CGI tunnel
  - Server-side caching (60s TTL)
  - Binary media handling (JSON, images, videos, subtitles)

deployment:
  - Flask app (Python, port 5000)
  - Next.js app (TypeScript, port 3000)
  - CGI tunnel on HuggingFace Space
  - Cloudflare tunnel for public access
