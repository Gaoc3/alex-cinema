version: "2"
type: backend
tech_stack:
  - TypeScript
  - Next.js API Routes
features:
  - name: Video Stream Proxy API
    description: Proxies video streams from external CDN to bypass Vercel limitations or route traffic through tunnels.
    files:
      - src/app/api/stream/route.ts
    endpoints:
      - method: GET
        path: /api/stream
        description: Fetches video files from external sources and streams them to the client
        auth_required: false
        request_schema:
          query:
            url: string
        response_schema:
          "200": Stream
          "502": Bad Gateway
  - name: Image Proxy API
    description: Proxies poster images to bypass CORS or external restrictions.
    files:
      - src/app/api/proxy/route.ts
    endpoints:
      - method: GET
        path: /api/proxy
        description: Fetches images from external URLs and returns them
        auth_required: false
        request_schema:
          query:
            endpoint: string
        response_schema:
          "200": Image
          "400": Bad Request
          "500": Internal Server Error
known_limitations: []
